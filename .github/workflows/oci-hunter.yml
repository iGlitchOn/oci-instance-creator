name: OCI Ampere Hunter
on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'  # Cada minuto

concurrency:
  group: oci-hunter
  cancel-in-progress: false

jobs:
  hunt:
    name: Hunt
    runs-on: ubuntu-latest
    
    steps:
      - name: Cache OCI CLI
        uses: actions/cache@v4
        with:
          path: ~/.local
          key: oci-cli-${{ runner.os }}
      
      - name: Install OCI CLI (solo primera vez)
        run: |
          if ! command -v oci &> /dev/null; then
            echo "📦 Instalando OCI CLI..."
            pip install --user oci-cli
          else
            echo "✅ OCI CLI ya instalado (desde caché)"
          fi
          oci --version
      
      - name: Crear instancia
        run: |
          echo "🚀 $(date '+%H:%M:%S')"
          
          # Shape config
          echo '{"ocpus":${{ vars.OCI_OCPUS }},"memoryInGBs":${{ vars.OCI_MEMORY_IN_GBS }}}' > shape.json
          
          # Intentar crear
          oci compute instance launch \
            --availability-domain "${{ vars.OCI_AVAILABILITY_DOMAIN }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config file://shape.json \
            --subnet-id "${{ vars.OCI_SUBNET_ID }}" \
            --image-id "${{ vars.OCI_IMAGE_ID }}" \
            --display-name "Ampere-${{ github.run_number }}" \
            --assign-public-ip true 2>&1 | tee out.log
          
          # Verificar éxito
          if grep -q '"id": "ocid1.instance' out.log; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ ¡INSTANCIA CREADA EXITOSAMENTE!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Desactivar workflow
            curl -s -X PUT -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/oci-hunter.yml/disable"
            
            echo "🛑 Workflow desactivado"
            exit 0
          fi
          
          # Mostrar error
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ ERROR:"
          if grep -qi "OutOfHostCapacity" out.log; then
            echo "💥 Out of host capacity for VM.Standard.A1.Flex"
          elif grep -qi "OutOfCapacity" out.log; then
            echo "💥 Out of capacity"
          elif grep -qi "LimitExceeded" out.log; then
            echo "💥 Service limit exceeded"
          else
            echo "💥 Mensaje:"
            grep -i '"message"' out.log | head -3 || echo "Ver logs completos arriba ⬆️"
          fi
          echo "⏳ Siguiente intento en 60 segundos"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENTS }}
          OCI_CLI_REGION: us-sanjose-1
