name: OCI Ampere Hunter
on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'  # Cada minuto

concurrency:
  group: oci-hunter
  cancel-in-progress: false

jobs:
  hunt:
    name: Hunt
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup OCI CLI
        uses: oracle-actions/configure-oci-cli@v1.0.1
        with:
          user: ${{ secrets.OCI_USER_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          region: us-sanjose-1
          api_key: ${{ secrets.OCI_PRIVATE_KEY_CONTENTS }}
      
      - name: Intentar crear instancia
        run: |
          echo "🚀 $(date '+%H:%M:%S')"
          
          # Shape config
          echo '{"ocpus":${{ vars.OCI_OCPUS }},"memoryInGBs":${{ vars.OCI_MEMORY_IN_GBS }}}' > shape.json
          
          # Intentar crear
          oci compute instance launch \
            --availability-domain "${{ vars.OCI_AVAILABILITY_DOMAIN }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config file://shape.json \
            --subnet-id "${{ vars.OCI_SUBNET_ID }}" \
            --image-id "${{ vars.OCI_IMAGE_ID }}" \
            --display-name "Ampere-${{ github.run_number }}" \
            --assign-public-ip true 2>&1 | tee out.log
          
          # Verificar éxito
          if grep -q '"id": "ocid1.instance' out.log; then
            echo "✅ CREADA"
            curl -s -X PUT -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/oci-hunter.yml/disable"
            exit 0
          fi
          
          # Mostrar error
          echo "❌ ERROR:"
          if grep -qi "OutOfHostCapacity" out.log; then
            echo "Out of host capacity"
          elif grep -qi "OutOfCapacity" out.log; then
            echo "Out of capacity"
          elif grep -qi "LimitExceeded" out.log; then
            echo "Limit exceeded"
          else
            grep -i '"message"' out.log | head -3 || echo "Ver logs arriba"
          fi
        continue-on-error: true
