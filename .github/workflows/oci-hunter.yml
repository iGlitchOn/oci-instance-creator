name: OCI Ampere Hunter
on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'  # Cada minuto

concurrency:
  group: oci-hunter
  cancel-in-progress: false

jobs:
  hunt:
    name: Hunt Ampere
    runs-on: ubuntu-latest
    timeout-minutes: 1
    
    steps:
      - name: 🎯 Intentar crear instancia
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Iniciando intento $(date '+%H:%M:%S')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Instalar OCI CLI (rápido, usa cache de pip)
          pip install --quiet oci-cli
          
          # Crear shape config
          cat > shape.json << 'EOF'
          {
            "ocpus": ${{ vars.OCI_OCPUS }},
            "memoryInGBs": ${{ vars.OCI_MEMORY_IN_GBS }}
          }
          EOF
          
          echo "📝 Shape config:"
          cat shape.json
          echo ""
          
          # Intentar crear instancia
          echo "⚡ Ejecutando comando OCI..."
          if oci compute instance launch \
            --availability-domain "${{ vars.OCI_AVAILABILITY_DOMAIN }}" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config file://shape.json \
            --subnet-id "${{ vars.OCI_SUBNET_ID }}" \
            --image-id "${{ vars.OCI_IMAGE_ID }}" \
            --display-name "Ampere-${{ github.run_number }}" \
            --assign-public-ip true \
            2>&1 | tee output.log; then
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ COMANDO EJECUTADO - Verificando..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Verificar si realmente se creó
            if grep -q '"id": "ocid1.instance' output.log; then
              echo "🎉🎉🎉 ¡INSTANCIA CREADA! 🎉🎉🎉"
              
              # Extraer ID y estado
              INSTANCE_ID=$(grep -o '"id": "ocid1.instance[^"]*"' output.log | head -1 | cut -d'"' -f4)
              echo "📋 Instance ID: $INSTANCE_ID"
              
              # Desactivar workflow
              curl -s -X PUT \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/oci-hunter.yml/disable"
              
              echo "🛑 Workflow desactivado"
              exit 0
            else
              echo "⚠️ Comando OK pero sin instancia en output"
            fi
          fi
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ ERROR DETECTADO:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Mostrar el error específico
          if grep -q "OutOfHostCapacity" output.log; then
            echo "💥 Out of host capacity for shape VM.Standard.A1.Flex"
          elif grep -q "OutOfCapacity" output.log; then
            echo "💥 Out of capacity"
          elif grep -q "LimitExceeded" output.log; then
            echo "💥 Service limit exceeded"
          elif grep -q "InternalError" output.log; then
            echo "💥 OCI Internal Error"
          elif grep -q "TooManyRequests" output.log; then
            echo "💥 Too many requests - rate limited"
          else
            echo "💥 Error desconocido - Ver logs arriba ⬆️"
            echo ""
            echo "📄 Últimas líneas del output:"
            tail -10 output.log
          fi
          
          echo ""
          echo "⏳ Reintentando en 60 segundos..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 0
        env:
          OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY_CONTENTS }}
          OCI_CLI_REGION: us-sanjose-1
